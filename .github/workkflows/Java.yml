name: Java

# when to run CI
on: [push, pull]

jobs:
  build:
    # what OS to run this on
    runs-on: ubuntu-latest

    # what steps will CI do 
    steps:
      # tells github to checkout our repo
      - name: Checkout Repo
        uses: actions/checkout@v4

      # installs things in order to run java
      - name: Install Compiler
        run: sudo apt install default-jdk

      # build java
      - name: Build
        run: make all

      # run java
      - name: Running Code
        run: make run
      
